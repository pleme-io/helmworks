# Example values for headscale (self-hosted Tailscale coordination server)
image:
  repository: ghcr.io/juanfont/headscale
  tag: "0.25.1"

persistence:
  enabled: true
  size: 2Gi
  storageClassName: local-path

oidcSecret:
  name: headscale-oidc-secret
  key: client-secret

config:
  server_url: "https://headscale.lilitu.io"
  listen_addr: "0.0.0.0:8080"
  metrics_listen_addr: "0.0.0.0:9090"
  grpc_listen_addr: "0.0.0.0:50443"
  grpc_allow_insecure: false
  noise:
    private_key_path: /var/lib/headscale/noise_private.key
  prefixes:
    v4: 100.64.0.0/10
    v6: fd7a:115c:a1e0::/48
    allocation: sequential
  derp:
    server:
      enabled: true
      region_id: 999
      region_code: "headscale"
      region_name: "Headscale Embedded DERP"
      stun_listen_addr: "0.0.0.0:3478"
    urls:
      - https://controlplane.tailscale.com/derpmap/default
    auto_update_enabled: true
    update_frequency: 24h
  disable_check_updates: true
  ephemeral_node_inactivity_timeout: 30m
  database:
    type: sqlite
    sqlite:
      path: /var/lib/headscale/db.sqlite
  dns:
    magic_dns: true
    base_domain: pleme.tailnet
    nameservers:
      global:
        - 1.1.1.1
        - 1.0.0.1
  log:
    level: info
  policy:
    mode: file
    path: ""
  oidc:
    issuer: "https://auth.lilitu.io/oauth2/openid/headscale"
    client_id: "headscale"
    client_secret_path: /etc/headscale/oidc/client-secret
    scope:
      - openid
      - profile
      - email
    pkce:
      enabled: true
    only_start_if_oidc_is_available: false
    allowed_groups: []
    strip_email_domain: true

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

monitoring:
  enabled: true
  port: metrics
  path: /metrics
  interval: 30s

networkPolicy:
  enabled: true
  allowPrometheus: true
  allowDns: true

grafana:
  enabled: true
  folder: Infrastructure
  instanceSelector:
    dashboards: grafana

prometheusRules:
  enabled: true
