# Example values for lilitu PostgreSQL CNPG cluster
fullnameOverride: lilitu-postgres

instances: 2

imageName: "ghcr.io/cloudnative-pg/postgresql:16"

database:
  name: lilitu
  owner: lilitu
  secret: lilitu-postgres-credentials
  postInitSQL:
    - CREATE EXTENSION IF NOT EXISTS "uuid-ossp"
    - CREATE EXTENSION IF NOT EXISTS "pgcrypto"

storage:
  size: 20Gi
  storageClass: local-path

postgresql:
  parameters:
    max_connections: "100"
    shared_buffers: "256MB"
    effective_cache_size: "768MB"
    work_mem: "4MB"
    maintenance_work_mem: "64MB"
    random_page_cost: "1.1"
    log_statement: "ddl"
    log_min_duration_statement: "1000"
  pg_hba:
    - host all all 10.42.0.0/16 md5

monitoring:
  enablePodMonitor: true

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: "2Gi"

affinity:
  tolerations:
    - key: "node-role.kubernetes.io/data"
      operator: "Exists"
      effect: "NoSchedule"
