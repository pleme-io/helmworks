suite: hanabi service tests
templates:
  - templates/service.yaml
values:
  - ../../examples/hanabi.yaml
tests:
  - it: should render a Service
    asserts:
      - isKind:
          of: Service

  - it: should expose dual ports
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 8080
            targetPort: http
            protocol: TCP
      - contains:
          path: spec.ports
          content:
            name: ws
            port: 8081
            targetPort: ws
            protocol: TCP

  - it: should be ClusterIP type
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP
