suite: pleme-statefulset tests
templates:
  - templates/statefulset.yaml
values:
  - ../../examples/nats.yaml
tests:
  - it: should render a StatefulSet
    asserts:
      - isKind:
          of: StatefulSet

  - it: should use the correct image
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "nats:2.10-alpine"

  - it: should set serviceName for headless DNS
    asserts:
      - matchRegex:
          path: spec.serviceName
          pattern: ".*-headless$"

  - it: should have FluxCD prune disabled annotation
    asserts:
      - equal:
          path: metadata.annotations["kustomize.toolkit.fluxcd.io/prune"]
          value: disabled

  - it: should set security context on pod
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true

  - it: should include sidecar containers
    asserts:
      - equal:
          path: spec.template.spec.containers[1].name
          value: metrics

  - it: should render volume claim templates
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.name
          value: jetstream-data
      - equal:
          path: spec.volumeClaimTemplates[0].spec.resources.requests.storage
          value: 5Gi
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.annotations["kustomize.toolkit.fluxcd.io/prune"]
          value: disabled
