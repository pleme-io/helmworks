suite: pleme-statefulset headless service tests
templates:
  - templates/headless-service.yaml
values:
  - ../../examples/nats.yaml
tests:
  - it: should render a headless Service
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.clusterIP
          value: None

  - it: should have headless suffix in name
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: ".*-headless$"
