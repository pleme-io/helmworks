suite: kenshi service account tests
templates:
  - templates/serviceaccount.yaml
values:
  - ../../examples/kenshi.yaml
tests:
  - it: should render operator service account
    documentIndex: 0
    asserts:
      - isKind:
          of: ServiceAccount

  - it: should render builder service account
    documentIndex: 1
    asserts:
      - isKind:
          of: ServiceAccount
      - matchRegex:
          path: metadata.name
          pattern: ".*-builder$"
