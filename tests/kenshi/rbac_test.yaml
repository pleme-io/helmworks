suite: kenshi RBAC tests
templates:
  - templates/rbac.yaml
values:
  - ../../examples/kenshi.yaml
tests:
  - it: should render operator ClusterRole
    documentIndex: 0
    asserts:
      - isKind:
          of: ClusterRole

  - it: should render operator ClusterRoleBinding
    documentIndex: 1
    asserts:
      - isKind:
          of: ClusterRoleBinding

  - it: should have kenshi CRD rules
    documentIndex: 0
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: ["kenshi.pleme.io"]
            resources: ["*"]
            verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - it: should not render RBAC when disabled
    set:
      rbac:
        create: false
    asserts:
      - hasDocuments:
          count: 0
