suite: pleme-microservice networkpolicy tests
templates:
  - templates/networkpolicy.yaml
values:
  - ../../examples/releases.yaml
tests:
  - it: should render deny-all policy
    documentIndex: 0
    asserts:
      - isKind:
          of: NetworkPolicy
      - equal:
          path: spec.policyTypes
          value:
            - Ingress
            - Egress

  - it: should render allow-dns policy
    documentIndex: 1
    asserts:
      - isKind:
          of: NetworkPolicy
      - contains:
          path: spec.egress[0].ports
          content:
            port: 53
            protocol: UDP

  - it: should render allow-prometheus policy
    documentIndex: 2
    asserts:
      - isKind:
          of: NetworkPolicy
      - equal:
          path: spec.ingress[0].from[0].namespaceSelector.matchLabels["kubernetes.io/metadata.name"]
          value: prometheus-operator

  - it: should not render when disabled
    set:
      networkPolicy:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0
