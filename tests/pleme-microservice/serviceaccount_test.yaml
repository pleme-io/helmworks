suite: pleme-microservice serviceaccount tests
templates:
  - templates/serviceaccount.yaml
values:
  - ../../examples/releases.yaml
tests:
  - it: should render a ServiceAccount
    asserts:
      - isKind:
          of: ServiceAccount

  - it: should not render when disabled
    set:
      serviceAccount:
        create: false
    asserts:
      - hasDocuments:
          count: 0
