suite: pleme-microservice service tests
templates:
  - templates/service.yaml
values:
  - ../../examples/releases.yaml
tests:
  - it: should render a Service
    asserts:
      - isKind:
          of: Service

  - it: should be ClusterIP type
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should expose http port 8080
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 8080
            targetPort: http
            protocol: TCP

  - it: should select the correct pods
    asserts:
      - exists:
          path: spec.selector["app.kubernetes.io/name"]
      - exists:
          path: spec.selector["app.kubernetes.io/instance"]
