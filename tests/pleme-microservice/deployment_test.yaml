suite: pleme-microservice deployment tests
templates:
  - templates/deployment.yaml
values:
  - ../../examples/releases.yaml
tests:
  - it: should render a Deployment
    asserts:
      - isKind:
          of: Deployment

  - it: should use the correct image
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/pleme-io/releases:latest"

  - it: should set security context on pod
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 1000

  - it: should set container security context
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          content: ALL

  - it: should set resource requests and limits
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 50m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 64Mi
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 200m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 256Mi

  - it: should set liveness probe
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /healthz
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: http

  - it: should set readiness probe
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /readyz
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: http

  - it: should set prometheus annotations when monitoring enabled
    asserts:
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/port"]
          value: "8080"
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/path"]
          value: "/metrics"

  - it: should include environment variables
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RUST_LOG
            value: "info,releases=debug"

  - it: should set replicas when autoscaling is disabled
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: should not set replicas when autoscaling is enabled
    set:
      autoscaling:
        enabled: true
    asserts:
      - isNull:
          path: spec.replicas

  - it: should use custom image tag
    set:
      image:
        repository: ghcr.io/pleme-io/releases
        tag: amd64-a0b78bf00d
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/pleme-io/releases:amd64-a0b78bf00d"
