suite: pleme-microservice servicemonitor tests
templates:
  - templates/servicemonitor.yaml
values:
  - ../../examples/releases.yaml
tests:
  - it: should render a ServiceMonitor when monitoring enabled
    asserts:
      - isKind:
          of: ServiceMonitor

  - it: should scrape the http port
    asserts:
      - equal:
          path: spec.endpoints[0].port
          value: http
      - equal:
          path: spec.endpoints[0].path
          value: /metrics
      - equal:
          path: spec.endpoints[0].interval
          value: 30s

  - it: should not render when monitoring disabled
    set:
      monitoring:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0
