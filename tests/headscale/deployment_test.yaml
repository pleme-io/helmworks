suite: headscale deployment tests
templates:
  - templates/deployment.yaml
  - templates/configmap.yaml
values:
  - ../../examples/headscale.yaml
tests:
  - it: should render a Deployment
    template: templates/deployment.yaml
    asserts:
      - isKind:
          of: Deployment

  - it: should use the correct image
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/juanfont/headscale:0.25.1"

  - it: should run headscale serve command
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].command
          value:
            - headscale
            - serve

  - it: should expose four ports
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: http
            containerPort: 8080
            protocol: TCP
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: grpc
            containerPort: 50443
            protocol: TCP
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: metrics
            containerPort: 9090
            protocol: TCP
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: stun
            containerPort: 3478
            protocol: UDP

  - it: should set pod security context
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 1000

  - it: should set container security context
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          content: ALL

  - it: should set health probes on /health
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: http
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: http

  - it: should set resource limits
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 50m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 64Mi
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 200m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 256Mi

  - it: should mount five volumes including oidc-secret
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /var/lib/headscale
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config
            mountPath: /etc/headscale
            readOnly: true
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tmp
            mountPath: /tmp
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: run
            mountPath: /var/run/headscale
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: oidc-secret
            mountPath: /etc/headscale/oidc
            readOnly: true

  - it: should mount oidc-secret volume with items mapping
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: oidc-secret
            secret:
              secretName: headscale-oidc-secret
              items:
                - key: client-secret
                  path: client-secret

  - it: should use Recreate strategy
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.strategy.type
          value: Recreate

  - it: should not mount oidc-secret when oidcSecret.name is empty
    template: templates/deployment.yaml
    set:
      oidcSecret:
        name: ""
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: oidc-secret
            mountPath: /etc/headscale/oidc
            readOnly: true
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: oidc-secret
          any: true
