suite: headscale service tests
templates:
  - templates/service.yaml
values:
  - ../../examples/headscale.yaml
tests:
  - it: should render a Service
    asserts:
      - isKind:
          of: Service

  - it: should be ClusterIP type
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should expose http port
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 8080
            targetPort: http
            protocol: TCP

  - it: should expose grpc port
    asserts:
      - contains:
          path: spec.ports
          content:
            name: grpc
            port: 50443
            targetPort: grpc
            protocol: TCP

  - it: should expose metrics port
    asserts:
      - contains:
          path: spec.ports
          content:
            name: metrics
            port: 9090
            targetPort: metrics
            protocol: TCP

  - it: should expose stun UDP port
    asserts:
      - contains:
          path: spec.ports
          content:
            name: stun
            port: 3478
            targetPort: stun
            protocol: UDP
