suite: pleme-cache statefulset tests
templates:
  - templates/statefulset.yaml
values:
  - ../../examples/lilitu-cache.yaml
tests:
  - it: should render a StatefulSet
    asserts:
      - isKind:
          of: StatefulSet

  - it: should use the correct image
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "valkey/valkey:8-alpine"

  - it: should have FluxCD prune disabled annotation
    asserts:
      - equal:
          path: metadata.annotations["kustomize.toolkit.fluxcd.io/prune"]
          value: disabled

  - it: should disable Istio injection
    asserts:
      - equal:
          path: spec.template.metadata.annotations["sidecar.istio.io/inject"]
          value: "false"

  - it: should include redis exporter sidecar when enabled
    asserts:
      - equal:
          path: spec.template.spec.containers[1].name
          value: exporter
      - equal:
          path: spec.template.spec.containers[1].ports[0].containerPort
          value: 9121

  - it: should include password init container when password enabled
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: config-init

  - it: should create persistence VCT when enabled
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.name
          value: data
      - equal:
          path: spec.volumeClaimTemplates[0].spec.resources.requests.storage
          value: 2Gi
