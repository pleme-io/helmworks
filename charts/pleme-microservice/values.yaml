# pleme-microservice default values
# HTTP service with Service, ServiceMonitor, and NetworkPolicy

image:
  repository: ""
  tag: latest
  pullPolicy: Always

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

replicaCount: 1

serviceAccount:
  create: true
  annotations: {}
  name: ""

ports:
  - name: http
    containerPort: 8080
    protocol: TCP

service:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP

env: []
envFrom: []
volumeMounts: []
volumes: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

health:
  path: /healthz
  readyPath: /readyz
  port: http
  livenessInitialDelay: 5
  livenessPeriod: 10
  livenessFailureThreshold: 3
  readinessInitialDelay: 5
  readinessPeriod: 5
  readinessFailureThreshold: 2

startupProbe:
  enabled: false
  path: /healthz
  port: http
  initialDelaySeconds: 0
  periodSeconds: 5
  failureThreshold: 30

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

strategy:
  type: RollingUpdate

terminationGracePeriodSeconds: 30

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
initContainers: []

monitoring:
  enabled: true
  port: http
  path: /metrics
  interval: 30s
  scrapeTimeout: 10s

networkPolicy:
  enabled: true
  allowPrometheus: true
  allowDns: true
  additionalIngress: []
  additionalEgress: []

pdb:
  enabled: false
  minAvailable: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

command: []
args: []
additionalLabels: {}
lifecycle: {}

configMaps: []
downwardApi:
  enabled: false
istio:
  enabled: false
podMonitor:
  enabled: false
prometheusRules:
  enabled: false
  groups: []
