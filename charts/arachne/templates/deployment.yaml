{{/*
Custom deployment for arachne — uses pleme-lib helpers but adds Chrome sidecar
with relaxed security context (SYS_ADMIN cap, writable fs, /dev/shm).
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pleme-lib.fullname" . }}
  namespace: {{ include "pleme-lib.namespace" . }}
  labels:
    {{- include "pleme-lib.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "pleme-lib.selectorLabels" . | nindent 6 }}
  {{- with .Values.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "pleme-lib.selectorLabels" . | nindent 8 }}
      annotations:
        {{- include "pleme-lib.prometheusAnnotations" . | nindent 8 }}
        sidecar.istio.io/inject: "false"
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "pleme-lib.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "pleme-lib.podSecurityContext" . | nindent 8 }}
      {{- with .Values.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        # Main arachne container — strict security baseline
        - name: {{ include "pleme-lib.name" . }}
          image: {{ include "pleme-lib.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy | default "Always" }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.ports }}
          ports:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: CHROME_WS_URL
              value: {{ .Values.chrome.wsUrl | default "http://localhost:9222" | quote }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- include "pleme-lib.containerSecurityContext" . | nindent 12 }}
          livenessProbe:
            {{- include "pleme-lib.livenessProbe" . | nindent 12 }}
          readinessProbe:
            {{- include "pleme-lib.readinessProbe" . | nindent 12 }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            {{- include "pleme-lib.startupProbe" . | nindent 12 }}
          {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- if .Values.chrome.enabled }}
        # Chrome headless sidecar — relaxed security (needs SYS_ADMIN + writable fs)
        - name: chrome
          image: {{ .Values.chrome.image.repository }}:{{ .Values.chrome.image.tag }}
          imagePullPolicy: {{ .Values.chrome.image.pullPolicy | default "Always" }}
          ports:
            - name: cdp
              containerPort: {{ .Values.chrome.port | default 9222 }}
              protocol: TCP
          {{- with .Values.chrome.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.chrome.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: true
            capabilities:
              add:
                - SYS_ADMIN
              drop: []
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
          livenessProbe:
            httpGet:
              path: /json/version
              port: cdp
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /json/version
              port: cdp
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 2
        {{- end }}
      volumes:
        {{- if .Values.chrome.enabled }}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.chrome.shmSize | default "256Mi" }}
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 30 }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
