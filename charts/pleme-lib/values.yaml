# pleme-lib default values (documentation only — library charts are not installed directly)
#
# These defaults are inherited by application charts that depend on pleme-lib.
# Override them in the application chart's values.yaml or at install time.

# -- Container image configuration
image:
  # -- Image repository (e.g., ghcr.io/pleme-io/releases)
  repository: ""
  # -- Image tag (overridden by kustomize overlays or HelmRelease patches)
  tag: latest
  # -- Image pull policy
  pullPolicy: Always

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Override the chart name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

# -- Number of replicas
replicaCount: 1

# -- Service account configuration
serviceAccount:
  # -- Create a service account
  create: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- Name override (defaults to fullname)
  name: ""

# -- Container ports
ports:
  - name: http
    containerPort: 8080
    protocol: TCP

# -- Service configuration
service:
  # -- Service type
  type: ClusterIP
  # -- Service ports
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP

# -- Environment variables
env: []

# -- Environment variables from ConfigMaps/Secrets
envFrom: []

# -- Volume mounts
volumeMounts: []

# -- Volumes
volumes: []

# -- Resource requests and limits
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

# -- Health check configuration
health:
  # -- Liveness probe path
  path: /healthz
  # -- Readiness probe path
  readyPath: /readyz
  # -- Port name for probes
  port: http
  # -- Initial delay for liveness probe
  livenessInitialDelay: 5
  # -- Period for liveness probe
  livenessPeriod: 10
  # -- Failure threshold for liveness probe
  livenessFailureThreshold: 3
  # -- Initial delay for readiness probe
  readinessInitialDelay: 5
  # -- Period for readiness probe
  readinessPeriod: 5
  # -- Failure threshold for readiness probe
  readinessFailureThreshold: 2

# -- Startup probe configuration (disabled by default)
startupProbe:
  enabled: false
  path: /healthz
  port: http
  initialDelaySeconds: 0
  periodSeconds: 5
  failureThreshold: 30

# -- Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# -- Container security context (enforced baseline — not overridable without explicit opt-out)
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- Deployment strategy
strategy:
  type: RollingUpdate

# -- Termination grace period
terminationGracePeriodSeconds: 30

# -- Pod annotations
podAnnotations: {}

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity rules
affinity: {}

# -- Topology spread constraints
topologySpreadConstraints: []

# -- Priority class name
priorityClassName: ""

# -- Init containers
initContainers: []

# -- Sidecar containers
sidecars: []

# -- Shinka DatabaseMigration CRD (renders shinka.pleme.io/v1alpha1 DatabaseMigration)
shinkaMigration:
  enabled: false
  database:
    cnpgClusterRef:
      name: ""
      database: ""
  migrator:
    name: ""
    type: sqlx
    deploymentRef:
      name: ""
    command: []
    env: {}
    envFrom: []
    resources:
      memoryLimit: "512Mi"
      cpuLimit: "500m"
      memoryRequest: "128Mi"
      cpuRequest: "100m"
    serviceAccountName: ""
  safety:
    requireHealthyCluster: true
    maxRetries: 3
    checksumMode: auto-reconcile
    continueOnFailure: false
  timeouts:
    migration: "5m"

# -- Shinka wait init container (polls for migration completion before app starts)
shinkaWait:
  enabled: false
  image: ghcr.io/pleme-io/shinka:amd64-latest
  migrationName: ""
  timeoutSeconds: 300
  retryIntervalSeconds: 5
  logLevel: info
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 32Mi

# -- Monitoring configuration
monitoring:
  # -- Enable ServiceMonitor creation
  enabled: true
  # -- Metrics port name
  port: http
  # -- Metrics path
  path: /metrics
  # -- Scrape interval
  interval: 30s
  # -- Scrape timeout
  scrapeTimeout: 10s

# -- NetworkPolicy configuration
networkPolicy:
  # -- Enable NetworkPolicy creation
  enabled: true
  # -- Allow ingress from Prometheus for scraping
  allowPrometheus: true
  # -- Allow DNS egress
  allowDns: true
  # -- Additional ingress rules
  additionalIngress: []
  # -- Additional egress rules
  additionalEgress: []

# -- PodDisruptionBudget configuration
pdb:
  # -- Enable PDB creation
  enabled: false
  # -- Minimum available pods
  minAvailable: 1
  # -- Maximum unavailable pods (alternative to minAvailable)
  # maxUnavailable: 1

# -- HorizontalPodAutoscaler configuration
autoscaling:
  # -- Enable HPA creation
  enabled: false
  # -- Minimum replicas
  minReplicas: 1
  # -- Maximum replicas
  maxReplicas: 5
  # -- Target CPU utilization percentage
  targetCPUUtilizationPercentage: 80
  # -- Target memory utilization percentage
  # targetMemoryUtilizationPercentage: 80

# -- Container command override
command: []

# -- Container args override
args: []

# -- Additional labels for all resources
additionalLabels: {}

# -- Lifecycle hooks
lifecycle: {}

# -- ConfigMaps to create
# Each entry: name (optional, defaults to {fullname}-config), data, labels, annotations
configMaps: []

# -- Downward API environment variables (POD_NAME, POD_NAMESPACE, NODE_NAME)
downwardApi:
  enabled: false

# -- Resource-level annotations (applied to Deployment, Service, etc. metadata)
annotations: {}

# -- Attestation framework integration (sekiban integrity verification)
# When enabled, produces sekiban.pleme.io/* annotations on all resources.
# These are verified by sekiban's ValidatingAdmissionWebhook before resources
# are admitted to the cluster.
#
# Hashes are computed by tameshi and injected by CI/CD (forge) during release.
# Do NOT set these manually — they are populated by the build pipeline.
attestation:
  # -- Enable attestation annotations
  enabled: false
  # -- Master signature hash (blake3:hex) — Merkle root of all layer signatures
  signature: ""
  # -- Product certification hash (blake3:hex) — end-to-end certification result
  certificationHash: ""
  # -- Compliance hash (blake3:hex) — NIST/OSCAL compliance test result
  complianceHash: ""
  # -- Changeset hash (blake3:hex) — resource changeset integrity
  changesetHash: ""

# -- Istio sidecar configuration
istio:
  # -- Enable Istio annotations and resources
  enabled: false
  # -- Inject sidecar proxy
  inject: true
  # -- Exclude outbound ports from proxy
  excludeOutboundPorts: ""
  # -- Exclude inbound ports from proxy
  excludeInboundPorts: ""
  # -- Hold app startup until proxy is ready
  holdApplicationUntilProxyStarts: false
  # -- PeerAuthentication resources (list)
  # peerAuthentication:
  #   - name: my-service
  #     mtls: STRICT
  # -- DestinationRule resources (list)
  # destinationRules: []

# -- PodMonitor configuration (for pods not behind a Service)
podMonitor:
  enabled: false
  port: metrics
  path: /metrics
  interval: 30s
  # -- Custom endpoints (overrides port/path/interval)
  # endpoints: []
  # -- Namespace selector
  # namespaceSelector:
  #   matchNames: []

# -- PrometheusRule configuration
prometheusRules:
  enabled: false
  # -- Alert/recording rule groups
  groups: []

# -- LimitRange configuration (governance)
limitRange:
  enabled: false
  container:
    default:
      cpu: "1"
      memory: 1Gi
    defaultRequest:
      cpu: 50m
      memory: 64Mi
    max:
      cpu: "2"
      memory: 2Gi
    min:
      cpu: 10m
      memory: 16Mi
  pod:
    max:
      cpu: "4"
      memory: 4Gi
  pvc:
    max:
      storage: 500Gi
    min:
      storage: 1Gi

# -- ResourceQuota configuration (governance)
resourceQuota:
  enabled: false
  hard:
    requests.cpu: "16"
    requests.memory: 24Gi
    limits.cpu: "32"
    limits.memory: 48Gi
    pods: "20"
    persistentvolumeclaims: "10"
    services: "10"
    configmaps: "20"
    secrets: "20"

# -- PriorityClass configuration (governance)
priorityClasses:
  # -- Prefix for priority class names
  prefix: ""
  # -- Priority class definitions
  classes: []
  # Default 4-tier example:
  # - name: critical
  #   value: 10000000
  #   description: "Critical platform services"
  # - name: data
  #   value: 10500000
  #   description: "Data services (databases, caches)"
  # - name: background
  #   value: 1000000
  #   description: "Background workers"
  # - name: batch
  #   value: 100000
  #   preemptionPolicy: Never
  #   description: "Batch jobs (non-preempting)"
