{{/*
Custom deployment for headscale — uses pleme-lib helpers but adds PVC
volume mount (SQLite data), ConfigMap volume (config.yaml), and emptyDir
for /tmp (read-only rootfs).
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pleme-lib.fullname" . }}
  namespace: {{ include "pleme-lib.namespace" . }}
  labels:
    {{- include "pleme-lib.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "pleme-lib.selectorLabels" . | nindent 6 }}
  {{- with .Values.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "pleme-lib.selectorLabels" . | nindent 8 }}
      annotations:
        {{- include "pleme-lib.prometheusAnnotations" . | nindent 8 }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "pleme-lib.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "pleme-lib.podSecurityContext" . | nindent 8 }}
      containers:
        - name: {{ include "pleme-lib.name" . }}
          image: {{ include "pleme-lib.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy | default "Always" }}
          command:
            - headscale
            - serve
          ports:
            {{- toYaml .Values.ports | nindent 12 }}
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- include "pleme-lib.containerSecurityContext" . | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.health.livenessInitialDelay }}
            periodSeconds: {{ .Values.health.livenessPeriod }}
            failureThreshold: {{ .Values.health.livenessFailureThreshold }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.health.readinessInitialDelay }}
            periodSeconds: {{ .Values.health.readinessPeriod }}
            failureThreshold: {{ .Values.health.readinessFailureThreshold }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/headscale
            - name: config
              mountPath: /etc/headscale
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /var/run/headscale
            {{- if .Values.oidcSecret.name }}
            - name: oidc-secret
              mountPath: /etc/headscale/oidc
              readOnly: true
            {{- end }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "pleme-lib.fullname" . }}-data
        - name: config
          configMap:
            name: {{ include "pleme-lib.fullname" . }}-config
        - name: tmp
          emptyDir: {}
        - name: run
          emptyDir: {}
        {{- if .Values.oidcSecret.name }}
        - name: oidc-secret
          secret:
            secretName: {{ .Values.oidcSecret.name }}
            items:
              - key: {{ .Values.oidcSecret.key | default "client-secret" }}
                path: client-secret
        {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 30 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
