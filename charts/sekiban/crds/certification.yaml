apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: certifications.sekiban.pleme.io
spec:
  group: sekiban.pleme.io
  names:
    kind: Certification
    listKind: CertificationList
    plural: certifications
    singular: certification
    shortNames:
      - cert
      - scert
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - environment
                - gates
              properties:
                environment:
                  type: string
                  description: Environment identifier (e.g., production, staging).
                gates:
                  type: array
                  items:
                    type: string
                  description: Names of SignatureGates that must pass.
                auditRetentionDays:
                  type: integer
                  format: int32
                  description: Days to retain audit entries (default 90).
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Certified
                    - Degraded
                    - Failed
                masterSignature:
                  type: string
                complianceSignature:
                  type: string
                secureSignature:
                  type: string
                lastCertifiedAt:
                  type: string
                  format: date-time
                gateStatuses:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      verified:
                        type: boolean
                      phase:
                        type: string
                      lastCheckedAt:
                        type: string
                        format: date-time
                message:
                  type: string
                auditTrail:
                  type: array
                  items:
                    type: object
                    properties:
                      timestamp:
                        type: string
                        format: date-time
                      action:
                        type: string
                      signature:
                        type: string
                      details:
                        type: string
                      resource:
                        type: string
                      allowed:
                        type: boolean
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Environment
          type: string
          jsonPath: .spec.environment
        - name: Certified
          type: string
          jsonPath: .status.lastCertifiedAt
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
