# pleme-worker default values
# Background worker — no Service, metrics-only port, lower priority

image:
  repository: ""
  tag: latest
  pullPolicy: Always

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

replicaCount: 1

serviceAccount:
  create: true
  annotations: {}
  name: ""

# Workers typically only expose metrics port
ports:
  - name: metrics
    containerPort: 9090
    protocol: TCP

# No Service by default — workers don't accept inbound traffic
service:
  enabled: false
  type: ClusterIP
  ports: []

env: []
envFrom: []
volumeMounts: []
volumes: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

health:
  path: /health
  readyPath: /health
  port: metrics
  livenessInitialDelay: 10
  livenessPeriod: 15
  livenessFailureThreshold: 3
  readinessInitialDelay: 5
  readinessPeriod: 10
  readinessFailureThreshold: 2

startupProbe:
  enabled: true
  path: /health
  port: metrics
  initialDelaySeconds: 5
  periodSeconds: 2
  failureThreshold: 30

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

strategy:
  type: RollingUpdate

terminationGracePeriodSeconds: 60

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
initContainers: []

monitoring:
  enabled: true
  port: metrics
  path: /metrics
  interval: 30s
  scrapeTimeout: 10s

networkPolicy:
  enabled: true
  allowPrometheus: true
  allowDns: true
  additionalIngress: []
  additionalEgress: []

pdb:
  enabled: false
  minAvailable: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

command: []
args: []
additionalLabels: {}
lifecycle: {}
