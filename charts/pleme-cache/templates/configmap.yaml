apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pleme-lib.fullname" . }}-config
  namespace: {{ include "pleme-lib.namespace" . }}
  labels:
    {{- include "pleme-lib.labels" . | nindent 4 }}
data:
  redis.conf: |
    bind 0.0.0.0
    port {{ .Values.cache.port | default 6379 }}
    {{- if .Values.cache.password.enabled }}
    requirepass __REDIS_PASSWORD__
    {{- end }}
    maxmemory {{ .Values.cache.maxmemory | default "256mb" }}
    maxmemory-policy {{ .Values.cache.maxmemoryPolicy | default "allkeys-lru" }}
    {{- if .Values.cache.persistence.enabled }}
    appendonly yes
    appendfilename "appendonly.aof"
    appendfsync {{ .Values.cache.persistence.appendfsync | default "everysec" }}
    {{- else }}
    appendonly no
    save ""
    {{- end }}
    {{- with .Values.cache.extraConfig }}
    {{ . | nindent 4 }}
    {{- end }}
